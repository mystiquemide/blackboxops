<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060c1a"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="core-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#0a1830"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#334155"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00d4ff"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#bg)" rx="12"/>
  <rect width="900" height="560" fill="none" stroke="#1e293b" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="13" font-weight="700" fill="#e2e8f0" letter-spacing="0.06em">BLACKBOXOPS — SYSTEM ARCHITECTURE</text>
  <text x="450" y="52" text-anchor="middle" font-size="9" fill="#475569" letter-spacing="0.12em">SPLUNK AGENTIC OPS HACKATHON · FORENSIC LAYER FOR AI AGENT OPERATIONS</text>

  <!-- ── ROW 1: User + React UI ── -->
  <!-- User -->
  <rect x="30" y="90" width="120" height="54" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="90" y="113" text-anchor="middle" font-size="9" font-weight="600" fill="#94a3b8" letter-spacing="0.08em">OPERATOR</text>
  <text x="90" y="128" text-anchor="middle" font-size="8" fill="#64748b">SRE / Platform Eng</text>

  <!-- React Dashboard -->
  <rect x="200" y="80" width="160" height="72" rx="8" fill="#0f172a" stroke="#1e40af" stroke-width="1.5"/>
  <text x="280" y="103" text-anchor="middle" font-size="9" font-weight="700" fill="#60a5fa" letter-spacing="0.08em">REACT DASHBOARD</text>
  <text x="280" y="118" text-anchor="middle" font-size="8" fill="#64748b">Replay Room · Incidents</text>
  <text x="280" y="131" text-anchor="middle" font-size="8" fill="#64748b">Policies · Postmortem</text>
  <text x="280" y="144" text-anchor="middle" font-size="8" fill="#334155">React 19 + TypeScript</text>

  <!-- Arrow: User -> Dashboard -->
  <line x1="150" y1="117" x2="198" y2="117" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FastAPI Backend -->
  <rect x="420" y="80" width="160" height="72" rx="8" fill="#0f172a" stroke="#1e40af" stroke-width="1.5"/>
  <text x="500" y="103" text-anchor="middle" font-size="9" font-weight="700" fill="#60a5fa" letter-spacing="0.08em">FASTAPI BACKEND</text>
  <text x="500" y="118" text-anchor="middle" font-size="8" fill="#64748b">REST API · Auth</text>
  <text x="500" y="131" text-anchor="middle" font-size="8" fill="#64748b">Postmortem · Approval</text>
  <text x="500" y="144" text-anchor="middle" font-size="8" fill="#334155">Python 3.11 · Railway</text>

  <!-- Arrow: Dashboard -> FastAPI -->
  <line x1="360" y1="116" x2="418" y2="116" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="389" y="112" text-anchor="middle" font-size="7.5" fill="#475569">HTTP</text>

  <!-- ── CORE BlackBoxOps box ── -->
  <rect x="30" y="200" width="620" height="190" rx="10" fill="url(#core-grad)" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="none" filter="url(#glow)"/>
  <text x="50" y="222" font-size="8" font-weight="700" fill="#00d4ff" letter-spacing="0.14em">BLACKBOXOPS CORE</text>

  <!-- Demo Agent -->
  <rect x="50" y="232" width="130" height="60" rx="7" fill="#0a1020" stroke="#1e293b" stroke-width="1"/>
  <text x="115" y="252" text-anchor="middle" font-size="9" font-weight="700" fill="#e2e8f0" letter-spacing="0.05em">DEMO AGENT</text>
  <text x="115" y="266" text-anchor="middle" font-size="8" fill="#64748b">Orchestrates queries</text>
  <text x="115" y="278" text-anchor="middle" font-size="8" fill="#64748b">+ remediation flow</text>

  <!-- Policy Engine -->
  <rect x="210" y="232" width="130" height="60" rx="7" fill="#0a1020" stroke="#ef4444" stroke-width="1.2"/>
  <text x="275" y="252" text-anchor="middle" font-size="9" font-weight="700" fill="#f87171" letter-spacing="0.05em">POLICY ENGINE</text>
  <text x="275" y="266" text-anchor="middle" font-size="8" fill="#64748b">YAML rules · fail-closed</text>
  <text x="275" y="278" text-anchor="middle" font-size="8" fill="#64748b">block / warn / allow</text>

  <!-- Event Recorder -->
  <rect x="370" y="232" width="130" height="60" rx="7" fill="#0a1020" stroke="#1e293b" stroke-width="1"/>
  <text x="435" y="252" text-anchor="middle" font-size="9" font-weight="700" fill="#e2e8f0" letter-spacing="0.05em">EVENT RECORDER</text>
  <text x="435" y="266" text-anchor="middle" font-size="8" fill="#64748b">Every query + decision</text>
  <text x="435" y="278" text-anchor="middle" font-size="8" fill="#64748b">HMAC-signed approvals</text>

  <!-- LLM Analyzer -->
  <rect x="530" y="232" width="100" height="60" rx="7" fill="#0a1020" stroke="#6366f1" stroke-width="1.2"/>
  <text x="580" y="252" text-anchor="middle" font-size="9" font-weight="700" fill="#a5b4fc" letter-spacing="0.05em">LLM CHAIN</text>
  <text x="580" y="266" text-anchor="middle" font-size="8" fill="#64748b">Splunk AI</text>
  <text x="580" y="278" text-anchor="middle" font-size="8" fill="#64748b">Groq fallback</text>

  <!-- Arrows inside core -->
  <line x1="180" y1="262" x2="208" y2="262" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="262" x2="368" y2="262" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="262" x2="528" y2="262" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Splunk Adapter -->
  <rect x="160" y="330" width="310" height="46" rx="7" fill="#0a1020" stroke="#00d4ff" stroke-width="1.2"/>
  <text x="315" y="350" text-anchor="middle" font-size="9" font-weight="700" fill="#00d4ff" letter-spacing="0.05em">SPLUNK ADAPTER</text>
  <text x="315" y="364" text-anchor="middle" font-size="8" fill="#64748b">MCP Server · REST API · Mock JSONL — same interface, swappable</text>

  <!-- Arrows: Agent -> Adapter, Policy -> Adapter -->
  <line x1="115" y1="292" x2="115" y2="316" stroke="#334155" stroke-width="1.2"/>
  <line x1="115" y1="316" x2="160" y2="350" stroke="#334155" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="275" y1="292" x2="275" y2="330" stroke="#334155" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrow: FastAPI -> Core -->
  <line x1="500" y1="152" x2="500" y2="200" stroke="#1e40af" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="500" y1="200" x2="435" y2="232" stroke="#1e40af" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── ROW 3: Splunk + Event Store ── -->
  <!-- Splunk Cloud -->
  <rect x="30" y="440" width="185" height="72" rx="8" fill="#0f172a" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="122" y="463" text-anchor="middle" font-size="9" font-weight="700" fill="#00d4ff" letter-spacing="0.08em">SPLUNK CLOUD</text>
  <text x="122" y="478" text-anchor="middle" font-size="8" fill="#64748b">MCP Server · SPL Search</text>
  <text x="122" y="491" text-anchor="middle" font-size="8" fill="#64748b">HEC ingestion · Hosted AI</text>
  <text x="122" y="504" text-anchor="middle" font-size="8" fill="#334155">prd-p-cxa8p.splunkcloud.com</text>

  <!-- Mock JSONL -->
  <rect x="245" y="440" width="145" height="72" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="317" y="463" text-anchor="middle" font-size="9" font-weight="700" fill="#94a3b8" letter-spacing="0.08em">MOCK ADAPTER</text>
  <text x="317" y="478" text-anchor="middle" font-size="8" fill="#64748b">Deterministic JSONL</text>
  <text x="317" y="491" text-anchor="middle" font-size="8" fill="#64748b">Offline-safe · CI-ready</text>
  <text x="317" y="504" text-anchor="middle" font-size="8" fill="#334155">sample_splunk_events.jsonl</text>

  <!-- Event Store -->
  <rect x="420" y="440" width="160" height="72" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="500" y="463" text-anchor="middle" font-size="9" font-weight="700" fill="#94a3b8" letter-spacing="0.08em">EVENT STORE</text>
  <text x="500" y="478" text-anchor="middle" font-size="8" fill="#64748b">JSONL append log</text>
  <text x="500" y="491" text-anchor="middle" font-size="8" fill="#64748b">Full replay + postmortem</text>
  <text x="500" y="504" text-anchor="middle" font-size="8" fill="#334155">blackbox_events.jsonl</text>

  <!-- Postmortem -->
  <rect x="610" y="440" width="150" height="72" rx="8" fill="#0f172a" stroke="#6366f1" stroke-width="1.2"/>
  <text x="685" y="463" text-anchor="middle" font-size="9" font-weight="700" fill="#a5b4fc" letter-spacing="0.08em">POSTMORTEM</text>
  <text x="685" y="478" text-anchor="middle" font-size="8" fill="#64748b">PDF · Markdown · XML</text>
  <text x="685" y="491" text-anchor="middle" font-size="8" fill="#64748b">Evidence-backed</text>
  <text x="685" y="504" text-anchor="middle" font-size="8" fill="#334155">Splunk dashboard export</text>

  <!-- Arrows: Adapter -> Splunk + Mock -->
  <line x1="215" y1="376" x2="122" y2="440" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="148" y="415" font-size="8" fill="#00d4ff">MCP / SPL</text>
  <line x1="315" y1="376" x2="315" y2="440" stroke="#475569" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="320" y="415" font-size="8" fill="#475569">mock</text>

  <!-- Arrows: Recorder -> Event Store -->
  <line x1="435" y1="292" x2="435" y2="340" stroke="#334155" stroke-width="1.2"/>
  <line x1="435" y1="380" x2="500" y2="440" stroke="#334155" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrow: FastAPI -> Postmortem -->
  <line x1="580" y1="152" x2="685" y2="440" stroke="#6366f1" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Arrow: Dashboard -> Postmortem (view) -->
  <line x1="360" y1="116" x2="685" y2="440" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,4" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="620" y="200" width="250" height="170" rx="8" fill="#060c1a" stroke="#1e293b" stroke-width="1"/>
  <text x="745" y="222" text-anchor="middle" font-size="8" font-weight="700" fill="#475569" letter-spacing="0.12em">LEGEND</text>
  <line x1="640" y1="238" x2="670" y2="238" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="680" y="242" font-size="8" fill="#94a3b8">Splunk MCP live data flow</text>
  <line x1="640" y1="258" x2="670" y2="258" stroke="#1e40af" stroke-width="1.5"/>
  <text x="680" y="262" font-size="8" fill="#94a3b8">React-to-API request</text>
  <line x1="640" y1="278" x2="670" y2="278" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="680" y="282" font-size="8" fill="#94a3b8">LLM / postmortem output</text>
  <line x1="640" y1="298" x2="670" y2="298" stroke="#475569" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="680" y="302" font-size="8" fill="#94a3b8">Mock fallback (offline)</text>
  <line x1="640" y1="318" x2="670" y2="318" stroke="#334155" stroke-width="1.5"/>
  <text x="680" y="322" font-size="8" fill="#94a3b8">Internal component flow</text>
  <rect x="640" y="330" width="14" height="14" rx="3" fill="#0a1020" stroke="#ef4444" stroke-width="1.2"/>
  <text x="663" y="341" font-size="8" fill="#94a3b8">Fail-closed policy gate</text>
</svg>
